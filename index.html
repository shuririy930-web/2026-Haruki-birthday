<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Noto Serif JP', serif;
  text-align: center;
  background: #f7f3eb;
  color: #4a3b2c;
}

/* スライドショー */

/* =========================
   フィルムフレーム（上下黒のみ）
========================= */

.film-frame {
  position: sticky;
  top: 0;
  z-index: 999;

  width: 100%;
  height: 200px;
  overflow: hidden;

  margin-bottom: 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  background: #111;
  box-sizing: border-box;
}

/* =========================
   上下の黒フレーム
========================= */
.film-frame::before,
.film-frame::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;

  height: 28px; /* ←太さここで調整 */
  background: #000;

  z-index: 3;
  pointer-events: none;
}

/* 上 */
.film-frame::before {
  top: 0;
}

/* 下 */
.film-frame::after {
  bottom: 0;
}

/* =========================
   スライド本体
========================= */
.slideshow {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* 画像 */

.slide {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;

  opacity: 0;
  transition: opacity 1s ease; /* ←アニメ滑らかに */
}

.slide.active {
  opacity: 1;
}

@keyframes slideShow {
  0% { opacity: 0; }
  10% { opacity: 1; }
  30% { opacity: 1; }
  40% { opacity: 0; }
  100% { opacity: 0; }
}

/* セクション */

.section {
 
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 10px;
}

/* happybirthdayの写真 */

.hero-image {
  width: 100%;
  overflow: hidden;
}

.hero-image img {

width: 120%; /* ←ここがポイント（100%以上にする） */
  height: auto; /* ←これで上下は絶対切れない */
  display: block;
  margin-left: -10%; /* ←中央に戻す（120%なら-10%） */

}

/* 封筒 */

.letter-button-area {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 40px 0;
}

.letter-btn {
  width: 250px; /* ←ここでサイズ調整*/
  cursor: pointer;
  transition: transform 0.2s;
}

.letter-btn:active {
  transform: scale(0.9);
}

/* カード */

.card {
  background: #f5efe6;
  padding: 30px 20px; /* ←そのまま（余白は増やさない） */
  border-radius: 16px;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.15),
    inset 0 0 10px rgba(0,0,0,0.05);

  max-width: 600px; /* ←400px → 600pxに拡張（ここが本命） */
   width: calc(100% - 40px); /* ←ここ変更（左右に余白作る） */
  margin: 0 auto;
}

/* 便箋 */

.letter {
  text-align: left;

  padding: 20px;
  padding-top: 28px; /* ←ここ調整ポイント */

  line-height: 32px;

  background-image: linear-gradient(#d8cfc3 1px, transparent 1px);
  background-size: 100% 32px;
  background-position: 0 28px; /* ←これと揃える */
}

/* サイン */
.signature {
  font-family: 'Great Vibes', cursive;
  font-size: 28px;
  position: absolute;
  right: 14px;
  bottom: 6px;
  opacity: 0.9;
}

/* 名前 */
.name {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
  letter-spacing: 2px;
}

/* 区切り */
.divider {
  width: 60px;
  border: none;
  border-top: 1px solid #6b4f3b;
  margin: 15px auto;
}


/* プレゼントボタン */

.gift {
  width: 180px; /* サイズ調整 */
  cursor: pointer;
  transition: transform 0.2s;
}
.gift:active {
  transform: scale(0.9);
}

/* モーダル背景 */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* 中身 */

.modal-content {
  display: flex;
  justify-content: center;
  width: 100%;
  animation: pop 0.5s ease;

flex-direction: column; /* ←これが超重要 */
  align-items: center;   

padding: 0 20px; /* ←これ追加！！！ */
  box-sizing: border-box;

}

/* ギフトボックスの開いた時  */

.first-gift {
  width: 250px;
  border-radius: 12px;
  opacity: 0;
  top: 50%;
  transform: scale(0.9);
  position: absolute;
  z-index: 10; 
display: none; 
transition: opacity 0.8s ease;
pointer-events: none;
}

.first-gift.fade-out {
  opacity: 0;
  
　
}

.first-gift.show {
  animation: giftIn 1s ease forwards;
}

@keyframes giftIn {
  0% {
    opacity: 0;
    transform: scale(0.7);
    filter: blur(6px);
  }
  100% {
    opacity: 1;
    transform: scale(1);
    filter: blur(0px);
  }
}

/* ライトのところ  */

.light {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  z-index: 10;
}

.light.show {
  animation: lightBurst 1.2s ease-out forwards;
}

@keyframes lightBurst {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.1);
    filter: blur(0px);
  }
  30% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(25);
    filter: blur(10px);
  }
}

/* チケット白画面 */

.ticket-wrapper {
  position: relative;
  width: 250px;
  height: 175px;
  display: flex;
  justify-content: center;
  align-items: center;
}
/* 白い？？？ */
.mystery {
  position: absolute;
  top: 0;
  left: 0;

  width: 250px;
  height: 175px;

  background: white;
  border-radius: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 60px;
  color: #999;

  z-index: 30;

opacity: 0;

transition: opacity 0.5s ease;
pointer-events: none;

}

/* フェードアウト */

.mystery.fade-out {
  animation: mysteryFade 2s ease forwards;
}

@keyframes mysteryFade {
  0% {
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}

/* チケット画像 */

.ticket {
  width: 250px;
  border-radius: 12px;
  height: 175px;

  position: absolute;
  top: 0;
  left: 0;

  opacity: 0;
  transition: opacity 2s ease;
}

.ticket.show {
  opacity: 1;
}

.ticket-link {
  display: inline-block;
 z-index: 100;
}

/* プレゼント開くアニメ */
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* スケジュール題名 */

.title-section {
  padding-bottom: 10px;
}

.title-section h2 {

font-family: 'Great Vibes', cursive;

  font-size: 40px;
  letter-spacing: -1px;
  font-weight: 500;
}

/* スケジュール表 */

.timeline {
  margin-top: 20px;
  position: relative;
  padding-left: 30px;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(107,79,59,0.3);
}

.event {
  position: relative;
  margin-bottom: 25px;
  text-align: left;
}

.time {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 5px;
}

.dot {
  position: absolute;
  left: -23px;
  top: 5px;
  width: 10px;
  height: 10px;
  background: #6b4f3b;
  border-radius: 50%;
}

.highlight .dot {
  background: gold;
  transform: scale(1.3);
}

/* フェード */
.fade {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s forwards;
}

.delay1 { animation-delay: 0.5s; }
.delay2 { animation-delay: 1s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<script>

function openGift() {
  vibrateTap();

  const modal = document.getElementById("modal");
  modal.style.display = "flex";

  const firstGift = document.querySelector(".first-gift");
  const light = document.querySelector(".light");
  const mystery = document.querySelector(".mystery");
  const ticket = document.querySelector(".ticket");

  // 🔥完全リセット（超重要）
  firstGift.style.display = "none";
  firstGift.classList.remove("show");

  light.classList.remove("show");

  mystery.classList.remove("fade-out");
  mystery.style.opacity = "0";

  ticket.classList.remove("show");

  // 強制再描画
  void modal.offsetWidth;

  // ② ギフト出現
  setTimeout(() => {
    firstGift.style.display = "block";
    firstGift.classList.add("show");
  }, 100);

// ③ 光
setTimeout(() => {
  light.classList.add("show");
}, 900);

// ⭐ ギフト先にフェードアウト
setTimeout(() => {
  firstGift.classList.add("fade-out");
}, 1200);

// ⭐ 完全に消す（透明にしきる）
setTimeout(() => {
  firstGift.style.display = "none";
}, 1600);



// ④ 白表示（この時点でギフトは完全に消えてる）
setTimeout(() => {
  mystery.style.opacity = "1";
}, 1500);

// ⑤ 白フェードアウト＋チケット

setTimeout(() => {
  mystery.classList.add("fade-out");
}, 2100);

setTimeout(() => {
  ticket.classList.add("show");
}, 2300);

}

function closeGift(e) {
  // 背景（黒い部分）だけで閉じる
  if (e.target.id === "modal") {
    document.getElementById("modal").style.display = "none";
  }
}

// スライドショー初期表示
let current = 0;
const slides = document.querySelectorAll(".slide");
slides[current].classList.add("active");

// スライドショー自動ループ
setInterval(() => {
  const next = (current + 1) % slides.length;

  slides[next].classList.add("active");
  slides[current].classList.remove("active");

  current = next;
}, 3000);


//お手紙の方

function openLetter() {
  vibrateTap();
  const modal = document.getElementById("letterModal");
  const fades = modal.querySelectorAll(".fade");

  // 一旦リセット
  fades.forEach(el => {
    el.style.animation = "none";
  });

  // 強制再描画（これ重要）
  void modal.offsetWidth;

  // アニメ再適用
  fades.forEach(el => {
    el.style.animation = "";
  });

  modal.style.display = "flex";
}

function closeLetter(e) {
  if (e && e.target.closest(".modal-content")) return;
  document.getElementById("letterModal").style.display = "none";
}

//ボタン押下時にスマホを振動させる
function vibrateTap() {
  if (navigator.vibrate) {
    navigator.vibrate(50);
  }
}

</script>
